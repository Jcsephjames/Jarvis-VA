<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <header class="top-bar">
      <div>JARVIS OS v1.0.0</div>
      <div id="onlineStatus">ONLINE</div>
      <div id="clock">--:--:-- UK</div>
    </header>

    <section class="dashboard">
      <section class="panel face-panel">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>

        <div class="panel-title">FACE</div>

        <div id="face" class="face idle">
          <div class="head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
          </div>
        </div>

        <div id="stateLabel" class="state-label">IDLE</div>
      </section>

      <section class="right-column">
        <section class="panel diagnostics-panel">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>

          <div class="panel-title">SYSTEM DIAGNOSTICS</div>
          <div class="diag-row"><span>State</span><b id="stateValue">idle</b></div>
          <div class="diag-row"><span>Brain</span><b>online</b></div>
          <div class="diag-row"><span>STT</span><b>ready</b></div>
          <div class="diag-row"><span>TTS</span><b>ready</b></div>
          <div class="diag-row"><span>Updated</span><b id="updatedValue">--</b></div>
        </section>

        <section class="panel transcript-panel">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>

          <div class="panel-title">TRANSCRIPT</div>
          <p id="transcript">Waiting for input...</p>
        </section>

        <section class="panel response-panel">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>

          <div class="panel-title">RESPONSE</div>
          <p id="response">JARVIS is standing by.</p>
        </section>
      </section>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
